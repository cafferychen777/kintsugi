name: CI

on:
  push:
  pull_request:

jobs:
  tests:
    name: Tests on Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install package with test dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"

      - name: Lint
        run: python -m ruff check kintsugi tests examples

      - name: Run tests
        run: python -m pytest --cov=kintsugi --cov-report=term-missing

  package:
    name: Build and smoke-test package
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Build distributions
        run: |
          python -m pip install --upgrade pip
          python -m pip install build twine
          python -m build
          python -m twine check dist/*

      - name: Smoke-test wheel install
        run: |
          python -m pip install dist/*.whl
          python -c "import kintsugi; from kintsugi import tessellate, GridData, TessellationResult, TessellationReport, tessellation_report, to_anndata, make_toy_dataset; print('kintsugi smoke import ok')"

  docker:
    name: Docker build test
    runs-on: ubuntu-24.04

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t kintsugi-test .

      - name: Run default demo in container
        run: docker run --rm kintsugi-test

      - name: Run deterministic smoke test in container
        run: |
          docker run --rm -i kintsugi-test python - <<'PY'
          import hashlib
          import kintsugi

          grid = kintsugi.make_toy_dataset()
          result = grid.tessellate()
          label_hash = hashlib.sha256(result.labels.tobytes()).hexdigest()[:16]
          assert result.n_regions == 75
          assert label_hash == "3653373eec97b137"
          print(f"docker smoke ok: {result.n_regions} regions, {label_hash}")
          PY

  singularity:
    name: Singularity/Apptainer build test
    runs-on: ubuntu-24.04

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install Apptainer
        run: |
          sudo apt-get update
          sudo apt-get install -y software-properties-common
          sudo add-apt-repository -y ppa:apptainer/ppa
          sudo apt-get update
          sudo apt-get install -y apptainer
          apptainer --version

      - name: Build Singularity image
        run: sudo apptainer build kintsugi.sif Singularity.def

      - name: Run container self-test
        run: apptainer test kintsugi.sif

      - name: Run demo in Singularity image
        run: apptainer exec kintsugi.sif python -m kintsugi.demo

      - name: Run deterministic smoke test in Singularity image
        run: |
          apptainer exec kintsugi.sif python - <<'PY'
          import hashlib
          import kintsugi

          grid = kintsugi.make_toy_dataset()
          result = grid.tessellate()
          label_hash = hashlib.sha256(result.labels.tobytes()).hexdigest()[:16]
          assert result.n_regions == 75
          assert label_hash == "3653373eec97b137"
          print(f"singularity smoke ok: {result.n_regions} regions, {label_hash}")
          PY
